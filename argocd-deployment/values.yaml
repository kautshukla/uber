global:
  namespace: uber
  deploy:
    secret: false
    mysql: true
    airflow: false
    hive: true
    redis: true
    kafka: true
    trino: true
    rangeradmin: false
    neo4j: false
    apollo: true
    cerebrum: false
    artemis: true
    dex: false
    mirage: false
    cosmos: false
    trinity: true
    cortex: false
    jobweaver: true
    monitor: false
  monitoring:
    enabled: false
  service:
    namespace: uber
    replicas: 1
    tag: v2.0.0
    imagePullPolicy: Always
    secretName: dview-secrets
    resources:
      requests:
        cpu: 100m
        memory: 0.5Gi
      limits:
        cpu: 1000m
        memory: 1Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
              - uber
    nodeSelector:
      kubernetes.io/arch: arm64
    tolerations: []
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 1
      averageMemoryUtilization: 70
      averageCpuUtilization: 70
    terminationGracePeriodSeconds: 30
    monitor:
      app:
        image: dview/pod-monitor
        tag: v2.0.0
    mysql:
      app:
        image: mysql
        tag: '8.0'
        port: 3306
        resources:
          requests:
            memory: 512Mi
            cpu: 500m
          limits:
            memory: 1Gi
            cpu: '1'
      pvc:
        enabled: true
        size: 10Gi
    jobweaver:
      replicas: 1
      dependencies:
        mysql:
          port: 3306
      app:
        image: dview/jobweaver
        tag: v2.1.0
        pullPolicy: IfNotPresent
        port: 8000
        resources:
          requests:
            memory: 1Gi
            cpu: 300m
          limits:
            memory: 2Gi
            cpu: 1000m
        gitSync:
          volumeRepoPath: /mnt/data
          volumeRepoDestPath: repo
        dbt:
          dbtDocsLogDir: /tmp/dbt_docs
          dbtArtifactsDir: /tmp/dbt_artifacts
          lineagePort: 8080
      sidecars:
        dbt:
          image: dview/jobweaver-dbt
          tag: v1.0.0
          pullPolicy: Always
          resources:
            requests:
              memory: 300Mi
              cpu: 200m
            limits:
              memory: 1000Mi
              cpu: 500m
        gitSync:
          image: k8s.gcr.io/git-sync/git-sync
          tag: v3.2.2
          pullPolicy: IfNotPresent
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 200m
    hive:
      app:
        image: dview/hive
        tag: 4.0.0
        port: 9083
        pullPolicy: Always
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                  - uber
                - key: arch
                  operator: In
                  values:
                  - arm64
        resources: {}
      dependencies:
        mysql:
          port: 3306
      pvc:
        enabled: false
    redis:
      app:
        image: redis
        tag: 7.4.0
        port: 6379
        resources: {}
      pvc:
        enabled: true
        size: 10Gi
      sidecars: {}
    kafka:
      app:
        image: bitnami/kafka
        tag: 3.8.0-debian-12-r3
        port: 9092
        resources: {}
      replicas: 1
      pvc:
        enabled: true
        size: 8Gi
    trino:
      app:
        image: dview/trino
        tag: '444'
        port: 8080
        resources: {}
      pvc:
        enabled: false
      workers: 1
      ranger:
        enabled: true
        repository_name: aqua
        endpoint: http://ranger-admin:6080
      additionalCatalogs: {}
      sidecars: {}
    apollo:
      pvc:
        enabled: false
      dependencies:
        mysql:
          port: 3306
      app:
        image: dview/apollo
        tag: v2.1.2
        port: 8080
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                  - uber
        resources: {}
      sidecars: {}
    cerebrum:
      pvc:
        enabled: false
      dependencies:
        mysql:
          port: 3306
      app:
        image: dview/cerebrum-app
        tag: v3.4.2
        port: 8000
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: roles
                  operator: In
                  values:
                  - metabase
        resources: {}
      sidecars:
        cerebrumWorkers:
          image: dview/cerebrum-worker
          tag: v3.4.2
          count: 3
          resources: {}
    artemis:
      pvc:
        enabled: false
      dependencies:
        mysql:
          port: 3306
      app:
        image: dview/artemis
        tag: v2.1.0
        port: 8080
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                  - uber
        resources: {}
      sidecars: {}
    pyserve:
      pvc:
        enabled: false
      app:
        image: dview/pyserve
        affinity: {}
        resources: {}
    dex:
      pvc:
        enabled: false
      dependencies:
        mysql:
          port: 3306
      app:
        image: dview/dex
        tag: v1.1.1
        port: 5556
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                  - uber
        resources: {}
      sidecars: {}
    mirage:
      pvc:
        enabled: false
      app:
        image: dview/mirage
        tag: v2.3.2
        port: 80
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                  - uber
        resources: {}
      sidecars: {}
    cosmos:
      dependencies:
        mysql:
          port: 3306
      pvc:
        enabled: false
      app:
        image: dview/cosmos
        tag: v2.1.0
        port: 8085
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                  - uber
        resources: {}
      sidecars: {}
    trinity:
      pvc:
        enabled: false
      app:
        image: dview/trinity
        tag: v1.1.1
        port: 8080
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                  - uber
        resources: {}
      sidecars: {}
    rangeradmin:
      pvc:
        enabled: false
      app:
        image: dview/ranger-admin
        tag: v2.5.0
        port: 6080
        resources: {}
      sidecars: {}
    cortex:
      app:
        image: dview/cortex-app
        tag: v4.0.2
        port: 8080
        resources: {}
      pvc:
        enabled: true
        size: 10Gi
      sidecars:
        cortexWorker:
          image: dview/cortex-worker
          tag: v4.0.2
          count: 3
          resources: {}
    airflow:
      app:
        port: 8080
        resources: {}
